<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark ink background -->
  <circle cx="16" cy="16" r="16" fill="#1A1209"/>
  <!-- Shuriken: two overlapping diamond blades -->
  <polygon points="16,3 21,16 16,29 11,16" fill="#E85D04"/>
  <polygon points="3,16 16,11 29,16 16,21" fill="#E85D04" fill-opacity="0.85"/>
  <!-- Center hole -->
  <circle cx="16" cy="16" r="3.5" fill="#1A1209"/>
  <!-- Center pin -->
  <circle cx="16" cy="16" r="1.5" fill="#C8B89A"/>
</svg>
